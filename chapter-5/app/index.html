<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Cloud Resume Optimizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #7c3aed;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-align: center;
    }
    p.subtitle {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 40px;
    }
    .card {
      background-color: var(--card);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    textarea {
      width: 100%;
      height: 150px;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: var(--text);
      padding: 12px;
      font-family: inherit;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      width: 100%;
      padding: 14px;
      background-color: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #6d28d9;
    }
    .results {
      margin-top: 30px;
      display: none;
    }
    .results h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 15px;
    }
    .analysis-box {
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 20px;
      white-space: pre-wrap;
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .loader {
      display: none;
      text-align: center;
      margin: 20px 0;
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>AI Resume Analyzer</h1>
    <p class="subtitle">Evaluate your resume against target jobs using serverless Amazon Bedrock LLMs</p>

    <div class="card">
      <div class="form-group">
        <label for="resume">Paste Resume Text</label>
        <textarea id="resume" placeholder="Paste your resume content here..."></textarea>
      </div>

      <div class="form-group">
        <label for="job">Paste Job Description</label>
        <textarea id="job" placeholder="Paste the target job description here..."></textarea>
      </div>

      <button onclick="runAnalysis()">Optimize Resume</button>

      <div class="loader" id="loader">Running AI Analysis (Llama 3)...</div>

      <div class="results" id="results">
        <h2>Recruiter Assessment</h2>
        <div class="analysis-box" id="analysis-text"></div>
      </div>
    </div>
  </div>

  <script>
    // Config: Replace this endpoint URL with your API Gateway endpoint URL from your deployment outputs!
    const API_ENDPOINT = "https://YOUR_API_ID.execute-api.us-east-1.amazonaws.com/Prod/analyze";

    async function runAnalysis() {
      const resume = document.getElementById("resume").value.trim();
      const job = document.getElementById("job").value.trim();

      if (!resume || !job) {
        alert("Please provide both your resume and the target job description.");
        return;
      }

      document.getElementById("loader").style.display = "block";
      document.getElementById("results").style.display = "none";

      try {
        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ resume, job_description: job })
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById("analysis-text").innerText = data.analysis;
          document.getElementById("results").style.display = "block";
        } else {
          alert("Error: " + (data.error || "Failed to analyze resume"));
        }
      } catch (err) {
        alert("Network Error: " + err.message);
      } finally {
        document.getElementById("loader").style.display = "none";
      }
    }
  </script>
</body>
</html>
